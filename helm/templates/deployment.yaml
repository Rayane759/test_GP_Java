apiVersion: apps/v1
kind: Deployment
metadata:
  name: gp-java-service-test10-avec-starter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gp-java-service-test10-avec-starter
  template:
    metadata:
      labels:
        app: gp-java-service-test10-avec-starter
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080